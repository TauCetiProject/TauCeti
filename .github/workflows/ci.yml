name: CI

on:
  # PR builds moved to pr-build.yml, which sandboxes untrusted PR code under landrun in a
  # trusted (base-defined) workflow. This run is only the post-merge health check on main.
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The two-library split is build convenience, not a trust boundary.
      # This guard is what actually stops the AI-owned library from inheriting
      # sorried declarations: TauCeti/ may not import the roadmap/review trees.
      - name: Import-boundary guard (TauCeti/ and TauCeti.lean ⊬ roadmap/review)
        run: |
          if grep -rIn -E '^[[:space:]]*import[[:space:]]+(TauCetiRoadmap|TauCetiReview)\b' TauCeti/ TauCeti.lean; then
            echo "::error::TauCeti/ and TauCeti.lean must not import TauCetiRoadmap or TauCetiReview"
            exit 1
          fi

      # No aggregator check: the root TauCeti.lean is intentionally empty and imports nothing.
      # The build globs every TauCeti/ module directly, so nothing depends on a root that
      # re-exports the library.
      - name: Build
        uses: leanprover/lean-action@v1
        with:
          test: false
          lint: false
          # Fetch prebuilt oleans from Mathlib's own cache server (`lake exe
          # cache get`); this takes only a few seconds and never builds Mathlib.
          use-mathlib-cache: true
          # Skip lean-action's GitHub `actions/cache` of `./.lake`. That archive
          # is ~2.4 GB; saving and restoring it costs ~40s per run, far more than
          # the ~6s `lake exe cache get` it would save. Net win to leave it off.
          use-github-cache: false

      # Axiom audit (replaces the old textual no-sorry grep). Inspects the built
      # TauCeti environment and rejects any axiom outside {propext, Classical.choice,
      # Quot.sound}, catching sorry/admit (sorryAx), native_decide (Lean.ofReduceBool),
      # and home-rolled axioms, including ones reaching in through imports.
      - name: Axiom audit (TauCeti/ uses only allowlisted axioms)
        run: lake exe axioms
