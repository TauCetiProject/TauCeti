name: Pages

# Build the Verso website in web/ and deploy it to GitHub Pages.
#
# The site project (web/) depends only on Verso. The type-checked theorem snippets are
# extracted by SubVerso from web/examples/ — a separate project that imports the real
# TauCeti library (and hence Mathlib) — so the showcased mathematics is elaborated at
# build time and cannot drift. The examples project is built first; its Mathlib oleans
# come from the cache, not a from-scratch rebuild.
#
# The API reference under /docs is generated by doc-gen4 from the nested docbuild/ project
# (which requires the real TauCeti library and shares the parent's Mathlib pin). With
# interproject linking (DOCGEN_LOCAL_MODULE_ROOTS / DOCGEN_DEPS_DOCS_URL, see the doc build
# step) doc-gen4 renders pages for only the TauCeti.* modules and links references to Mathlib
# out to the hosted mathlib4_docs, so the output is small (tens of MB, not the whole rendered
# closure). It is rebuilt at most once a day — on the schedule below, plus the first run that
# finds no cached docs — and cached under a date-bucketed key. A push that touches only web/
# (or the chart scripts) reuses the cached docs, since the mathematics has not changed, so
# those site deploys stay fast.
#
# The Statistics page's "lines of code by date" charts are regenerated here, at deploy
# time, straight from git history (see scripts/loc_graph.py) — they are not committed
# state. The per-roadmap chart (scripts/loc_roadmap_graph.py) is regenerated the same
# way, but from the PR labels rather than git, since roadmap attribution lives in the
# `roadmap/<Area>` labels; it reads them via gh (hence pull-requests: read below). The
# daily `schedule` below redeploys the site so the charts track the project as it grows.
# (This replaces the old loc-graph workflow, which committed the SVGs to main on a
# schedule; main now sits behind a merge queue that refuses direct pushes, so generating
# the charts in this build is the only way they refresh.)

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docbuild/**'
      - 'scripts/loc_graph.py'
      - 'scripts/loc_roadmap_graph.py'
      - '.github/workflows/pages.yml'
  schedule:
    - cron: "0 6 * * *"   # Daily 06:00 UTC: refresh the lines-of-code charts and the API docs
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: read   # the per-roadmap chart reads PR labels via gh (scripts/loc_roadmap_graph.py)

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Run JavaScript actions on Node 24 (Node 20 is deprecated on GitHub runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      # Full history: scripts/loc_graph.py reconstructs the whole "lines by date"
      # series by walking every commit, so a shallow checkout would truncate the charts.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone the roadmap repository (full history, for its chart)
        working-directory: ${{ github.workspace }}
        run: git clone --quiet https://github.com/TauCetiProject/TauCetiRoadmap.git /tmp/roadmap

      # Overwrites the checked-in SVGs in the runner only (never committed back). The
      # versions tracked in web/static_files/ are just fallback snapshots so a local
      # `cd web && lake exe web` renders something; refresh them by running these same
      # two commands. The deployed charts always come from this step, not from the repo.
      - name: Regenerate the lines-of-code charts into static_files
        working-directory: ${{ github.workspace }}
        run: |
          python3 scripts/loc_graph.py \
            --repo . --ref HEAD \
            --title "Tau Ceti — lines of Lean" --accent "#ff9d4d" \
            --out web/static_files/loc-tauceti.svg \
            TauCeti TauCeti.lean
          python3 scripts/loc_graph.py \
            --repo /tmp/roadmap --ref HEAD \
            --title "Tau Ceti Roadmap — lines written" --accent "#5eead4" \
            --out web/static_files/loc-roadmap.svg \
            TauCetiRoadmap TauCetiRoadmap.lean

      # The per-roadmap chart is built from the PR labels (roadmap attribution is not in
      # git), so it queries gh rather than walking commits. A gh failure here must not sink
      # the whole deploy — the committed fallback SVG stays in place if the query fails.
      - name: Regenerate the per-roadmap chart into static_files
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 scripts/loc_roadmap_graph.py \
            --repo "${{ github.repository }}" \
            --title "Tau Ceti — lines of Lean per roadmap" \
            --out web/static_files/loc-per-roadmap.svg \
          || echo "::warning::per-roadmap chart generation failed; keeping the committed fallback SVG"

      - name: Install elan
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh -o elan-init.sh
          chmod +x elan-init.sh
          ./elan-init.sh -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # --- API documentation (doc-gen4), built at most once a day ------------------------
      # The doc build is the heavy part of this job, and the mathematics only changes on
      # pushes to TauCeti/ (never on the web/-only pushes that trigger this workflow), so the
      # generated HTML is cached under a per-day key and reused on same-day / web-only runs.

      - name: Compute today's date (the daily docs cache bucket)
        id: date
        run: echo "today=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      # restore-only: the doc tree is several GB, so we do not want the automatic post-job
      # re-upload that plain actions/cache does on runs that merely reused the docs. The save
      # below runs only when we actually rebuilt.
      - name: Restore the generated API docs
        id: docs-cache
        uses: actions/cache/restore@v4
        with:
          path: docbuild/.lake/build/doc
          key: docs-html-${{ hashFiles('lean-toolchain', 'docbuild/lake-manifest.json') }}-${{ steps.date.outputs.today }}
          restore-keys: |
            docs-html-${{ hashFiles('lean-toolchain', 'docbuild/lake-manifest.json') }}-

      # Rebuild on the daily schedule / manual dispatch, or whenever no cached docs exist at
      # all (e.g. the first run after this workflow lands) so /docs is never missing for long.
      - name: Decide whether to (re)build the API docs
        id: docs-plan
        env:
          EVENT: ${{ github.event_name }}
          MATCHED: ${{ steps.docs-cache.outputs.cache-matched-key }}
        run: |
          if [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ] || [ -z "$MATCHED" ]; then
            echo "build=true" >> "$GITHUB_OUTPUT"
          else
            echo "build=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch Mathlib oleans (docs project)
        if: steps.docs-plan.outputs.build == 'true'
        working-directory: docbuild
        run: lake exe cache get

      # doc-gen4 documents a library's root modules and their closure; TauCeti's root is empty
      # by design, so we regenerate a throwaway aggregator root that imports the whole glob.
      - name: Generate the docs aggregator root
        if: steps.docs-plan.outputs.build == 'true'
        working-directory: docbuild
        run: python3 mk_docs_root.py

      # Render pages for only the TauCeti.* modules; references to Mathlib (and Lean core) link
      # out to the hosted mathlib4_docs via its /find resolver. Start from a clean doc tree so
      # pages for deleted modules do not linger (this step never runs on the web-only reuse
      # path, which keeps the restored cache).
      - name: Build the API documentation (doc-gen4)
        if: steps.docs-plan.outputs.build == 'true'
        working-directory: docbuild
        env:
          DOCGEN_LOCAL_MODULE_ROOTS: TauCeti
          DOCGEN_DEPS_DOCS_URL: https://leanprover-community.github.io/mathlib4_docs
        run: |
          rm -rf .lake/build/doc .lake/build/doc-data
          lake build TauCetiDocs:docs

      - name: Save the generated API docs to today's cache bucket
        if: steps.docs-plan.outputs.build == 'true'
        uses: actions/cache/save@v4
        with:
          path: docbuild/.lake/build/doc
          key: docs-html-${{ hashFiles('lean-toolchain', 'docbuild/lake-manifest.json') }}-${{ steps.date.outputs.today }}

      - name: Cache Lake builds (site + examples)
        uses: actions/cache@v4
        with:
          path: |
            web/.lake
            web/examples/.lake
          key: web-lake-${{ runner.os }}-${{ hashFiles('web/lake-manifest.json', 'web/lean-toolchain', 'web/examples/lake-manifest.json', 'web/examples/lean-toolchain') }}
          restore-keys: web-lake-${{ runner.os }}-

      - name: Fetch Mathlib oleans (examples project)
        working-directory: web/examples
        run: lake exe cache get

      - name: Build examples project (checks the showcased TauCeti theorems)
        working-directory: web/examples
        run: lake build

      - name: Build site (extracts the checked snippets, compiles Verso)
        run: lake build

      - name: Generate static site
        run: lake exe web --output _out

      # Place the doc-gen4 output (fresh from this run, or restored from the daily cache) at
      # /docs inside the site artifact. deploy-pages replaces the whole site each time, so the
      # docs must ride along in every deploy — hence the cache that keeps them available on
      # runs that did not rebuild them.
      - name: Fold the API docs into the site under /docs
        run: |
          if [ -d ../docbuild/.lake/build/doc ]; then
            rm -rf _out/docs
            cp -a ../docbuild/.lake/build/doc _out/docs
          else
            echo "::warning::no generated API docs found; /docs will be absent from this deploy"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/_out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
